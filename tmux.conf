unbind C-b
set -g prefix C-Space
bind Space send-prefix

# Prevent tmux from delaying esc
# as this makes vim via tmux annoying
set -s -g escape-time 0

set-window-option -g mode-keys vi
set -g default-shell $SHELL
set -g history-limit 20000
# set -g utf8 on set-window-option -g utf8 on
set -g default-terminal screen-256color

source-file ~/.tmux-system.conf

bind v split-window -h -c "#{pane_current_path}" # Split panes horizontal
bind s split-window -v -c "#{pane_current_path}" # Split panes vertically

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -n C-k clear-history
# set-option -g mouse on

set-option -s set-clipboard off

source ~/.tmux.theme

set-option -g status-right '#(cat ~/.thyme-tmux)'
set-option -g status-interval 1

bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-l resize-pane -R
bind -r C-h resize-pane -L

# Session management
bind C command-prompt -p "new session:" "new-session -s '%%'"
bind f display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs tmux switch-client -t"

# Claude settings to work nicely with Shift + Return
# Explicitly bind Shift+Enter to send the CSI u sequence
bind-key -n S-Enter send-keys Escape "[13;2u"

# Enable extended keys support in tmux
set -s extended-keys on

# Tell tmux that the terminal supports extended keys
set -as terminal-features 'tmux-256color:extkeys'
